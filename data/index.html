          if (!selectEl || !saveBtn || !msgEl) return;

          if (!zoneSettingsLoaded) {
            zoneSettingsLoaded = true;
            let isFixedZoneCount = false;
            try {
              const r = await fetch("/api/settings", { credentials: "same-origin" });
              if (r.ok) {
                const s = await r.json();
                const hardware = String(s?.hardware || "").toLowerCase();
                isFixedZoneCount = hardware === "sonoff4ch";
                const current = isFixedZoneCount ? 4 : Number(s?.zoneCount || 8);
                selectEl.value = ["1", "2", "3", "4", "5", "6", "7", "8"].includes(String(current))
                  ? String(current)
                  : (isFixedZoneCount ? "4" : "8");
              }
            } catch {}

            selectEl.disabled = isFixedZoneCount;
            saveBtn.disabled = isFixedZoneCount;
            if (isFixedZoneCount) saveBtn.dataset.locked = "1";
            else delete saveBtn.dataset.locked;

            msgEl.dataset.noteKey = isFixedZoneCount ? "zoneCountFixedSonoff" : "zoneCountNote";
            if (!msgEl.dataset.runtimeMessage || isFixedZoneCount) {
              delete msgEl.dataset.runtimeMessage;
              msgEl.textContent = t(msgEl.dataset.noteKey);
              msgEl.style.color = "#6b7280";
            }
          }

          if (!saveBtn.dataset.bound) {
            saveBtn.dataset.bound = "1";
            saveBtn.addEventListener("click", () => saveZoneCount(selectEl.value, msgEl, saveBtn));
          }
        }

        function removeSettingsSmartPlugCard() {
          const existing = document.getElementById("settings-smart-plug-card");
          if (existing) existing.remove();
        }

        async function upsertSettingsSmartPlugCard() {
          const container = getSettingsContainer();
          if (!container || !cloudSessionEnabled) {
            removeSettingsSmartPlugCard();
            return;
          }

          let card = document.getElementById("settings-smart-plug-card");
          if (!card) {
            card = document.createElement("div");
            card.id = "settings-smart-plug-card";
            card.className = "ios-card p-4 mb-4";
            card.innerHTML = `
              <div class="settings-smart-plug-row">
                <div id="settings-smart-plug-title" class="settings-smart-plug-title">${t("settingsSmartPlugTitle")}</div>
                <button id="settings-smart-plug-search" type="button" data-no-swipe="1">${t("settingsSmartPlugSearch")}</button>
              </div>
            `;
            const smartPlugCard = document.getElementById("settings-smart-plug-card");
            const zoneCard = document.getElementById("zone-count-card");
            if (smartPlugCard && smartPlugCard.parentElement === container) smartPlugCard.insertAdjacentElement("afterend", card);
            else if (zoneCard && zoneCard.parentElement === container) zoneCard.insertAdjacentElement("afterend", card);
            else container.appendChild(card);
          } else if (card.parentElement !== container) {
            container.appendChild(card);
          }

          const title = document.getElementById("settings-smart-plug-title");
          if (title) title.textContent = t("settingsSmartPlugTitle");
          const searchBtn = document.getElementById("settings-smart-plug-search");
          if (searchBtn) {
            searchBtn.textContent = t("settingsSmartPlugSearch");
            if (!searchBtn.dataset.bound) {
              searchBtn.dataset.bound = "1";
              searchBtn.addEventListener("click", () => openAddDeviceModal());
            }
          }
        }

        function setSettingsDeviceMsg(text, ok = false) {
          settingsDeviceMsg = String(text || "");
          settingsDeviceMsgOk = !!ok;
          const node = document.getElementById("settings-device-msg");
          if (!node) return;
          node.textContent = translateTextValue(settingsDeviceMsg);
          node.style.color = settingsDeviceMsg ? (settingsDeviceMsgOk ? "#059669" : "#b91c1c") : "#6b7280";
        }

        async function unclaimSelectedDeviceFromSettings() {
          if (!cloudSessionEnabled) return;
          const did = settingsDeviceIdValue || "";
          if (!did) {
            setSettingsDeviceMsg(t("noAssignedDevice"));
            return;
          }
          if (!confirm(t("confirmUnclaim", { deviceId: did }))) return;
          const btn = document.getElementById("settings-unclaim-btn");
          const oldLabel = btn ? btn.textContent : "";
          if (btn) {
            btn.disabled = true;
            btn.textContent = t("unclaiming");
          }
          setSettingsDeviceMsg("");
          try {
            const r = await fetch("/api/devices/unclaim", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ device_id: did }),
              credentials: "same-origin",
            });
            const d = await r.json().catch(() => ({}));
            if (!r.ok || !d?.ok) {
              setSettingsDeviceMsg(d?.error || t("unclaimFailed"));
              return;
            }
            settingsDeviceIdLoaded = false;
            settingsDeviceIdValue = "";
            setSettingsDeviceMsg(t("deviceUnclaimed"), true);
            const remaining = Array.isArray(d?.devices) ? d.devices.length : 0;
            setTimeout(() => {
              location.href = remaining > 0 ? "/" : "/devices";
            }, 250);
          } catch {
            setSettingsDeviceMsg(t("unclaimConnectionError"));
          } finally {
            if (btn) {
              btn.disabled = false;
              btn.textContent = oldLabel || t("unclaimButton");
            }
          }
        }

        async function upsertSettingsDeviceId() {
          const container = getSettingsContainer();
          const existingRow = document.getElementById("settings-device-row");
          const existingMsg = document.getElementById("settings-device-msg");
          if (!container) {
            if (existingRow) existingRow.remove();
            if (existingMsg) existingMsg.remove();
            settingsDeviceIdLoaded = false;
            settingsDeviceIdValue = "";
            settingsDeviceMsg = "";
            return;
          }

          let row = existingRow;
          if (!row) {
            row = document.createElement("div");
            row.id = "settings-device-row";
            row.innerHTML = `
              <div id="settings-device-id-wrap">
                <div id="settings-device-id" data-no-translate="1">WMS_-----</div>
              </div>
              <button id="settings-unclaim-btn" type="button">${t("unclaimButton")}</button>
            `;
            container.appendChild(row);
          } else if (row.parentElement !== container) {
            container.appendChild(row);
          }

          let msgNode = existingMsg;
          if (!msgNode) {
            msgNode = document.createElement("div");
            msgNode.id = "settings-device-msg";
            msgNode.textContent = "";
            container.appendChild(msgNode);
          } else if (msgNode.parentElement !== container) {
            container.appendChild(msgNode);
          }

          const node = document.getElementById("settings-device-id");
          const unclaimBtn = document.getElementById("settings-unclaim-btn");
          if (!node || !unclaimBtn) return;

          if (!unclaimBtn.dataset.bound) {
            unclaimBtn.dataset.bound = "1";
            unclaimBtn.addEventListener("click", unclaimSelectedDeviceFromSettings);
          }

          if (!settingsDeviceIdLoaded) {
            try {
              const statusResp = await fetch("/api/status", { credentials: "same-origin" });
              if (statusResp?.ok) {
                const s = await statusResp.json();
                const did = String(s?.device_id || "").trim().toUpperCase();
                if (/^WMS_\d{5}$/.test(did)) settingsDeviceIdValue = did;
              }
            } catch {}
            settingsDeviceIdLoaded = true;
          }

          node.textContent = settingsDeviceIdValue || "WMS_-----";
          unclaimBtn.style.display = settingsDeviceIdValue ? "inline-flex" : "none";
          setSettingsDeviceMsg(settingsDeviceMsg, settingsDeviceMsgOk);
          container.appendChild(row);
          container.appendChild(msgNode);
        }

        async function upsertSettingsFwVersion() {
          const container = getSettingsContainer();
          const existing = document.getElementById("settings-fw-version");
          if (!container) {
            if (existing) existing.remove();
            settingsFwVersionLoaded = false;
            settingsFwVersionValue = "";
            return;
          }

          let node = existing;
          if (!node) {
            node = document.createElement("div");
            node.id = "settings-fw-version";
            node.textContent = `${t("fwLabel")}: -`;
            container.appendChild(node);
          } else if (node.parentElement !== container) {
            container.appendChild(node);
          }

          if (!settingsFwVersionLoaded) {
            settingsFwVersionLoaded = true;
            try {
              const r = await fetch("/api/status", { credentials: "same-origin" });
              if (r.ok) {
                const s = await r.json();
                const fw = String(s?.fw_version || "").trim();
                if (fw) settingsFwVersionValue = fw;
              }
            } catch {}
          }

          node.textContent = settingsFwVersionValue
            ? `${t("fwLabel")}: ${settingsFwVersionValue}`
            : `${t("fwLabel")}: -`;
        }

        async function upsertSettingsOwmStatus() {
          const container = getSettingsContainer();
          const existing = document.getElementById("settings-owm-status");
          if (!container) {
            if (existing) existing.remove();
            settingsOwmLoaded = false;
            settingsOwmConfigured = false;
            return;
          }

          let node = existing;
          if (!node) {
            node = document.createElement("div");
            node.id = "settings-owm-status";
            node.textContent = t("owmChecking");
            container.appendChild(node);
          } else if (node.parentElement !== container) {
            container.appendChild(node);
          }

          if (!settingsOwmLoaded) {
            settingsOwmLoaded = true;
            try {
              const r = await fetch("/api/settings", { credentials: "same-origin" });
              if (r.ok) {
                const s = await r.json();
                settingsOwmConfigured = !!s?.owmApiKeyConfigured;
              }
            } catch {}
          }

          node.textContent = settingsOwmConfigured ? t("owmSaved") : t("owmMissing");
        }

        function setSettingsHaMsg(text, ok = false) {
          settingsHaMsg = String(text || "");
          settingsHaMsgOk = !!ok;
          const node = document.getElementById("settings-ha-msg");
          if (!node) return;
          node.textContent = translateTextValue(settingsHaMsg);
          node.style.color = settingsHaMsg ? (settingsHaMsgOk ? "#059669" : "#b91c1c") : "#6b7280";
        }

        function syncSettingsHaExpandedState() {
          const card = document.getElementById("settings-ha-card");
          if (!card) return;
          const content = card.querySelector(".settings-ha-content");
          const toggle = document.getElementById("settings-ha-toggle");
          const toggleLabel = document.getElementById("settings-ha-toggle-text");
          if (toggle) {
            toggle.checked = settingsHaExpanded;
            toggle.setAttribute("aria-expanded", settingsHaExpanded ? "true" : "false");
          }
          if (content) content.hidden = !settingsHaExpanded;
          if (toggleLabel) toggleLabel.textContent = t(settingsHaExpanded ? "haHideDetails" : "haShowDetails");
        }

        function setSettingsHaExpanded(next) {
          settingsHaExpanded = !!next;
          try {
            localStorage.setItem(SETTINGS_HA_EXPANDED_KEY, settingsHaExpanded ? "1" : "0");
          } catch {}
          syncSettingsHaExpandedState();
        }

        function renderSettingsHaValues(data) {
          const host = String(data?.broker?.host || "-");
          const port = String(data?.broker?.port || "-");
          const tls = data?.broker?.tls ? "TLS" : t("noTls");
          const broker = `${host}:${port} (${tls})`;
          const user = String(data?.username || "-");
          const pass = String(data?.password || "-");
          const topicBase = String(data?.topic_base || "-");
          const prefix = String(data?.discovery?.prefix || "-");
          const node = String(data?.discovery?.node || "-");
          const refreshTopic = String(data?.refresh_topic || (topicBase !== "-" ? `${topicBase}/global/refresh` : "-"));
          const statusTopic = String(data?.ha_status_topic || (prefix !== "-" ? `${prefix}/status` : "-"));
          const discovery = `${prefix} / node: ${node}`;
          const rotatedAt = data?.rotated_at ? formatDisplayDate(data.rotated_at) : "-";
          const revision = Number.isFinite(Number(data?.revision)) ? String(Number(data.revision)) : "-";

          const map = {
            broker,
            user,
            pass,
            topicBase,
            refreshTopic,
            statusTopic,
            discovery,
            rotatedAt,
            revision,
          };
          Object.entries(map).forEach(([k, v]) => {
            const el = document.getElementById(`settings-ha-${k}`);
            if (el) el.textContent = v;
          });
        }

        async function copySettingsHa(field) {
          const el = document.getElementById(`settings-ha-${field}`);
          if (!el) return;
          const txt = String(el.textContent || "").trim();
          if (!txt || txt === "-") return;
          try {
            await navigator.clipboard.writeText(txt);
            setSettingsHaMsg(t("clipboardCopied"), true);
          } catch {
            setSettingsHaMsg(t("clipboardCopyFailed"));
          }
        }

        async function loadSettingsHaData({ rotate = false } = {}) {
          if (!cloudSessionEnabled) return;
          setSettingsHaMsg(rotate ? t("rotatingPassword") : t("loadingHaData"));
          try {
            const r = await fetch(rotate ? "/api/ha/mqtt/rotate" : "/api/ha/mqtt", {
              method: rotate ? "POST" : "GET",
              credentials: "same-origin",
            });
            const d = await r.json().catch(() => ({}));
            if (!r.ok || !d?.ok) {
              setSettingsHaMsg(d?.error || t("loadHaFailed"));
              return;
            }
            settingsHaData = d;
            settingsHaLoaded = true;
            renderSettingsHaValues(settingsHaData);
            setSettingsHaMsg(rotate ? t("newHaPasswordSaved") : t("haDataReady"), true);
          } catch {
            setSettingsHaMsg(t("loadHaConnectionError"));
          }
        }

        async function runSettingsHaRediscover() {
          if (!cloudSessionEnabled) return;
          setSettingsHaMsg(t("forcingRediscovery"));
          try {
            const r = await fetch("/api/ha/mqtt/rediscover", {
              method: "POST",
              credentials: "same-origin",
            });
            const d = await r.json().catch(() => ({}));
            if (!r.ok || !d?.ok) {
              setSettingsHaMsg(d?.error || t("forceRediscoveryFailed"));
              return;
            }
            const topics = Array.isArray(d?.published) ? d.published.join(" | ") : "";
            setSettingsHaMsg(t("rediscoverySent", { suffix: topics ? ` (${topics})` : "" }), true);
          } catch {
            setSettingsHaMsg(t("rediscoveryConnectionError"));
          }
        }

        async function runSettingsHaTest() {
          if (!cloudSessionEnabled) return;
          setSettingsHaMsg(t("testingHaMqtt"));
          try {
            const r = await fetch("/api/ha/mqtt/test", {
              method: "POST",
              credentials: "same-origin",
            });
            const d = await r.json().catch(() => ({}));
            if (!d || typeof d !== "object") {
              setSettingsHaMsg(t("invalidMqttTestResponse"));
              return;
            }
            const testData = d.test || {};
            const pub = Array.isArray(testData.publish) ? testData.publish : [];
            const pubOk = pub.filter((p) => p?.ok).length;
            const pubAll = pub.length;
            const subOk = !!testData?.subscribe?.ok;
            const dur = Number.isFinite(Number(testData?.duration_ms)) ? `${Number(testData.duration_ms)} ms` : "-";
            const ok = !!d.ok;
            const details = ok
              ? t("mqttTestOk", { subState: subOk ? "OK" : "ERR", pubOk, pubAll, duration: dur })
              : t("mqttTestFailed", { error: String(testData?.error || d?.error || t("mqttAuthError")) });
            setSettingsHaMsg(details, ok);
          } catch {
            setSettingsHaMsg(t("mqttTestConnectionError"));
          }
        }

        function removeSettingsHaCard() {
          const existing = document.getElementById("settings-ha-card");
          if (existing) existing.remove();
          settingsHaLoaded = false;
          settingsHaData = null;
          settingsHaMsg = "";
        }

        async function upsertSettingsHaCard() {
          const container = getSettingsContainer();
          if (!container || !cloudSessionEnabled) {
            removeSettingsHaCard();
            return;
          }

          let card = document.getElementById("settings-ha-card");
          if (!card) {
            card = document.createElement("div");
            card.id = "settings-ha-card";
            card.className = "ios-card p-4 mb-4";
            card.innerHTML = `
              <div class="settings-ha-header">
                <h3 class="font-semibold">${t("haCardTitle")}</h3>
                <label class="settings-ha-toggle-row" for="settings-ha-toggle">
                  <span class="settings-ha-toggle-label" id="settings-ha-toggle-text">${t(settingsHaExpanded ? "haHideDetails" : "haShowDetails")}</span>
                  <span class="settings-ha-switch">
                    <input id="settings-ha-toggle" type="checkbox" ${settingsHaExpanded ? "checked" : ""} aria-expanded="${settingsHaExpanded ? "true" : "false"}">
                    <span class="settings-ha-slider"></span>
                  </span>
                </label>
              </div>
              <div class="settings-ha-content" ${settingsHaExpanded ? "" : "hidden"}>
                <p class="settings-ha-note">${t("haCardNote")}</p>
                <div class="settings-ha-grid">
                  <div class="settings-ha-k">${t("haBroker")}</div><div class="settings-ha-v" id="settings-ha-broker" data-no-translate="1">-</div><button class="settings-ha-copy" type="button" data-settings-ha-copy="broker">${t("haCopy")}</button>
                  <div class="settings-ha-k">${t("haUser")}</div><div class="settings-ha-v" id="settings-ha-user" data-no-translate="1">-</div><button class="settings-ha-copy" type="button" data-settings-ha-copy="user">${t("haCopy")}</button>
                  <div class="settings-ha-k">${t("haPass")}</div><div class="settings-ha-v" id="settings-ha-pass" data-no-translate="1">-</div><button class="settings-ha-copy" type="button" data-settings-ha-copy="pass">${t("haCopy")}</button>
                  <div class="settings-ha-k">${t("haTopicBase")}</div><div class="settings-ha-v" id="settings-ha-topicBase" data-no-translate="1">-</div><button class="settings-ha-copy" type="button" data-settings-ha-copy="topicBase">${t("haCopy")}</button>
                  <div class="settings-ha-k">${t("haRefreshTopic")}</div><div class="settings-ha-v" id="settings-ha-refreshTopic" data-no-translate="1">-</div><button class="settings-ha-copy" type="button" data-settings-ha-copy="refreshTopic">${t("haCopy")}</button>
                  <div class="settings-ha-k">${t("haStatusTopic")}</div><div class="settings-ha-v" id="settings-ha-statusTopic" data-no-translate="1">-</div><button class="settings-ha-copy" type="button" data-settings-ha-copy="statusTopic">${t("haCopy")}</button>
                  <div class="settings-ha-k">${t("haDiscovery")}</div><div class="settings-ha-v" id="settings-ha-discovery" data-no-translate="1">-</div><button class="settings-ha-copy" type="button" data-settings-ha-copy="discovery">${t("haCopy")}</button>
                  <div class="settings-ha-k">${t("haRotatedAt")}</div><div class="settings-ha-v" id="settings-ha-rotatedAt" data-no-translate="1">-</div><span></span>
                  <div class="settings-ha-k">${t("haRevision")}</div><div class="settings-ha-v" id="settings-ha-revision" data-no-translate="1">-</div><span></span>
                </div>
                <div class="settings-ha-actions">
                  <button id="settings-ha-refresh" class="settings-ha-btn secondary" type="button">${t("haRefreshData")}</button>
                  <button id="settings-ha-test" class="settings-ha-btn secondary" type="button">${t("haTestMqtt")}</button>
                  <button id="settings-ha-rediscover" class="settings-ha-btn secondary" type="button">${t("haForceRediscovery")}</button>
                  <button id="settings-ha-rotate" class="settings-ha-btn warn" type="button">${t("haRotatePass")}</button>
                </div>
                <div id="settings-ha-msg"></div>
              </div>
            `;
            const smartPlugCard = document.getElementById("settings-smart-plug-card");
            const zoneCard = document.getElementById("zone-count-card");
            if (smartPlugCard && smartPlugCard.parentElement === container) smartPlugCard.insertAdjacentElement("afterend", card);
            else if (zoneCard && zoneCard.parentElement === container) zoneCard.insertAdjacentElement("afterend", card);
            else container.appendChild(card);
          } else if (card.parentElement !== container) {
            container.appendChild(card);
          }

          if (!card.dataset.bound) {
            card.dataset.bound = "1";
            card.querySelectorAll("[data-settings-ha-copy]").forEach((btn) => {
              btn.addEventListener("click", () => copySettingsHa(btn.getAttribute("data-settings-ha-copy")));
            });
            const toggleInput = document.getElementById("settings-ha-toggle");
            if (toggleInput) {
              toggleInput.addEventListener("change", (event) => {
                setSettingsHaExpanded(!!event.target?.checked);
              });
            }
            const refreshBtn = document.getElementById("settings-ha-refresh");
            const testBtn = document.getElementById("settings-ha-test");
            const rediscoverBtn = document.getElementById("settings-ha-rediscover");
            const rotateBtn = document.getElementById("settings-ha-rotate");
            if (refreshBtn) refreshBtn.addEventListener("click", () => loadSettingsHaData({ rotate: false }));
            if (testBtn) testBtn.addEventListener("click", () => runSettingsHaTest());
            if (rediscoverBtn) rediscoverBtn.addEventListener("click", () => runSettingsHaRediscover());
            if (rotateBtn) {
              rotateBtn.addEventListener("click", async () => {
                const did = settingsDeviceIdValue || t("thisDevice");
                if (!confirm(t("rotateHaConfirm", { deviceId: did }))) return;
                await loadSettingsHaData({ rotate: true });
              });
            }
          }

          syncSettingsHaExpandedState();
          if (settingsHaData) renderSettingsHaValues(settingsHaData);
          setSettingsHaMsg(settingsHaMsg, settingsHaMsgOk);
          if (!settingsHaLoaded) await loadSettingsHaData({ rotate: false });
        }

        buildDomLookupMap();
        currentLang = resolveInitialLanguage();
        applyLanguage(currentLang, { persist: true, closeMenu: false });

        if (langTrigger) {
          langTrigger.addEventListener("click", (event) => {
            event.preventDefault();
            if (langSwitcher && langSwitcher.classList.contains("is-open")) closeLanguageMenu();
            else openLanguageMenu();
          });
        }
        langOptionButtons.forEach((btn) => {
          btn.addEventListener("click", () => {
            const nextLang = String(btn.getAttribute("data-lang") || "").toLowerCase();
            if (!nextLang) return;
            applyLanguage(nextLang, { persist: true, closeMenu: true });
            langTrigger?.focus();
          });
        });
        document.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof Element)) return;
          if (!langSwitcher || langSwitcher.contains(target)) return;
          closeLanguageMenu();
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") closeLanguageMenu();
        });

        const observerConfig = { childList: true, subtree: true };
        const observerTarget = () => document.getElementById("root") || document.body || document.documentElement;
        let refreshScheduled = false;
        let refreshInProgress = false;
        const observer = new MutationObserver(() => {
          if (refreshScheduled || refreshInProgress) return;
          refreshScheduled = true;
          requestAnimationFrame(() => {
            refreshScheduled = false;
            if (refreshInProgress) return;
            refreshInProgress = true;
            observer.disconnect();
            try {
              hideMqttCard();
              mountAuthInline();
              upsertAddDeviceHeaderAction();
              upsertSchedulesPlugCard();
              upsertSmartClimateCard();
              upsertZoneCountCard();
              upsertSettingsSmartPlugCard();
              upsertSettingsHaCard();
              upsertSettingsFwVersion();
              upsertSettingsOwmStatus();
              upsertSettingsDeviceId();
              refreshInlineCardLabels();
              scheduleDomTranslation();
              refreshPlugPresence(false);
            } finally {
              refreshInProgress = false;
              observer.observe(observerTarget(), observerConfig);
            }
          });
        });
        observer.observe(observerTarget(), observerConfig);
        window.addEventListener("resize", () => upsertAddDeviceHeaderAction(), { passive: true });
        refreshInProgress = true;
        observer.disconnect();
        try {
          mountAuthInline();
          hideMqttCard();
          upsertAddDeviceHeaderAction();
          upsertSchedulesPlugCard();
          upsertSmartClimateCard();
          upsertZoneCountCard();
          upsertSettingsSmartPlugCard();
          upsertSettingsHaCard();
          upsertSettingsFwVersion();
          upsertSettingsOwmStatus();
          upsertSettingsDeviceId();
          refreshInlineCardLabels();
          scheduleDomTranslation();
          refreshPlugPresence(false);
        } finally {
          refreshInProgress = false;
          observer.observe(observerTarget(), observerConfig);
        }
        enhanceMobileTabBarTouch();
        enhanceSwipeSectionNavigation();
        bindIdleSessionHandlers();
        setupCloudAuthBadge();
        checkOtaNotice();
        setInterval(checkOtaNotice, 30000);
      })();
    </script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
