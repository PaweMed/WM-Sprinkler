        function normalizeLang(value) {

          const cookie = String(document.cookie || "");
          const match = cookie.match(new RegExp(`(?:^|;\\s*)${name}=([^;]*)`));

            const type = String(el.getAttribute("type") || "").toLowerCase();
            if ((type === "button" || type === "submit" || type === "reset") && el.hasAttribute("value")) {
              const value = el.getAttribute("value");
              const translated = translateTextValue(value);
              if (translated !== value) el.setAttribute("value", translated);
            }
          }
        }

        function translateDomSubtree(root = document.body) {
          if (!root || translatingDom) return;
          translatingDom = true;
          try {
            if (root.nodeType === Node.ELEMENT_NODE) translateElementAttributes(root);
            const elementWalker = document.createTreeWalker(root, NodeFilter.SHOW_ELEMENT);
            let elementNode;
            while ((elementNode = elementWalker.nextNode())) {
              translateElementAttributes(elementNode);
            }
            const textWalker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
            let textNode;
            while ((textNode = textWalker.nextNode())) {
              if (shouldSkipTextNode(textNode)) continue;
              const nextValue = translateTextValue(textNode.textContent);
              if (nextValue !== textNode.textContent) textNode.textContent = nextValue;
            }
          } finally {
            translatingDom = false;
          }
        }

        function scheduleDomTranslation(root = document.body) {
          if (translateDomQueued) return;
          translateDomQueued = true;
          requestAnimationFrame(() => {
            translateDomQueued = false;
            translateDomSubtree(root);
          });
        }

        function normalizeTimezoneSelectionValue(value) {
          const tz = String(value || "").trim();
          if (!tz) return "";
          if (tz === "UTC") return "Etc/UTC";
          if (tz === "+00:00") return "Europe/London";
          if (tz === "+01:00") return "Europe/Berlin";
          if (tz === "+02:00") return "Europe/Warsaw";
          if (tz === "-09:00") return "America/Anchorage";
          if (tz === "-08:00") return "America/Los_Angeles";
          if (tz === "-07:00") return "America/Denver";

          if (tz === "+06:00") return "Asia/Almaty";
          if (tz === "+09:00") return "Asia/Tokyo";
          if (tz === "+10:00") return "Australia/Sydney";
          if (tz === "+12:00") return "Pacific/Auckland";
          return tz;
        }

        function getTimeZoneOffsetMinutes(timeZone, date) {
          const formatter = new Intl.DateTimeFormat("en-US", {
            timeZone,
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hourCycle: "h23",
          });
          const parts = {};
          formatter.formatToParts(date).forEach((part) => {
            if (part.type !== "literal") parts[part.type] = part.value;
          });
          const zoneTimeUtc = Date.UTC(
            Number(parts.year),
            Number(parts.month) - 1,
            Number(parts.day),
            Number(parts.hour),
            Number(parts.minute),
            Number(parts.second),
          );
          return Math.round((zoneTimeUtc - date.getTime()) / 60000);
        }

        function getTimezoneModeLabel(timeZone) {
          const normalized = normalizeTimezoneSelectionValue(timeZone);
          if (!autoDstTimezones.has(normalized)) return t("timezoneFixedTime");
          try {
            const now = new Date();
            const year = now.getUTCFullYear();
            const jan = new Date(Date.UTC(year, 0, 1, 12, 0, 0));
            const jul = new Date(Date.UTC(year, 6, 1, 12, 0, 0));
            const janOffset = getTimeZoneOffsetMinutes(normalized, jan);
            const julOffset = getTimeZoneOffsetMinutes(normalized, jul);
            if (!Number.isFinite(janOffset) || !Number.isFinite(julOffset) || janOffset === julOffset) {
              return t("timezoneUnknownMode");
            }
            const currentOffset = getTimeZoneOffsetMinutes(normalized, now);
            const summerOffset = Math.max(janOffset, julOffset);
            return currentOffset === summerOffset ? t("timezoneSummerTime") : t("timezoneWinterTime");
          } catch {
            return t("timezoneUnknownMode");
          }
        }

        function resetIdleDeadline() {
          idleDeadline = Date.now() + idleTimeoutMs;

        async function cloudLogout() {
          if (idleStopped) return;
          idleStopped = true;
          try {
            await fetch("/api/logout", { method: "POST", credentials: "same-origin" });
          } catch {}
          location.href = "/";
        }

        async function touchCloudSession(force = false) {
          if (!cloudSessionEnabled || idleStopped || touchInFlight) return;
          const now = Date.now();
          if (!force && now - lastTouchTs < 60 * 1000) return;
          touchInFlight = true;
          lastTouchTs = now;
          try {
            const r = await fetch("/api/session/touch", { method: "POST", credentials: "same-origin" });
            if (r.status === 401) {
              await cloudLogout();
              return;
            }
            if (r.ok) {
              const d = await r.json().catch(() => ({}));
              const serverIdle = Number(d?.idleTimeoutMs || 0);
              if (Number.isFinite(serverIdle) && serverIdle >= 60 * 1000) idleTimeoutMs = serverIdle;
              resetIdleDeadline();
            }
          } catch {
            // Brak zmian; timeout bezczynności działa lokalnie.
          } finally {
            touchInFlight = false;
          }
        }

        function bindIdleSessionHandlers() {
          const onActivity = () => {
            if (!cloudSessionEnabled || idleStopped) return;
            const now = Date.now();
            if (now - lastActivityEventTs < 1000) return;
            lastActivityEventTs = now;
            resetIdleDeadline();
            touchCloudSession(false);
          };
          ["pointerdown", "keydown", "touchstart", "mousedown", "wheel", "scroll"].forEach((evt) => {
            window.addEventListener(evt, onActivity, { passive: true });
          });
          document.addEventListener("visibilitychange", () => {
            if (!document.hidden) onActivity();
          });
          setInterval(() => {
            if (!cloudSessionEnabled || idleStopped) return;
            if (Date.now() >= idleDeadline) cloudLogout();
          }, 1000);
        }

        function enhanceMobileTabBarTouch() {
          let touchStartX = 0;
          let touchStartY = 0;
          let touchStartTs = 0;
          let touchTarget = null;

          document.addEventListener("touchstart", (event) => {
            const target = event.target;
            if (!(target instanceof Element)) return;
            const tab = target.closest(".tab-bar .tab-item");
            if (!tab) return;
            const touch = event.changedTouches?.[0];
            if (!touch) return;
            touchTarget = tab;
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            touchStartTs = Date.now();
          }, { passive: true, capture: true });

          const clearTouchState = () => {
            touchTarget = null;
          };
          document.addEventListener("touchcancel", clearTouchState, { passive: true, capture: true });

          document.addEventListener("touchend", (event) => {
            if (!touchTarget) return;
            const target = event.target;
            if (!(target instanceof Element)) return clearTouchState();
            const tab = target.closest(".tab-bar .tab-item");
            if (!tab || tab !== touchTarget) return clearTouchState();
            const touch = event.changedTouches?.[0];
            if (!touch) return clearTouchState();

            const dx = Math.abs(touch.clientX - touchStartX);
            const dy = Math.abs(touch.clientY - touchStartY);
            const dt = Date.now() - touchStartTs;
            clearTouchState();
            if (dx > 12 || dy > 12 || dt > 500) return;

            const now = Date.now();
            const lastTapTs = Number(tab.dataset.wmsLastTapTs || 0);
            if (now - lastTapTs < 250) return;
            tab.dataset.wmsLastTapTs = String(now);

            event.preventDefault();
            tab.click();
          }, { passive: false, capture: true });
        }

        function enhanceSwipeSectionNavigation() {
          let touchStartX = 0;
          let touchStartY = 0;
          let touchStartTs = 0;
          let tracking = false;
          let axis = "";
          let swipeLocked = false;
          let sourceContainer = null;
          let dragDx = 0;
          let dragRaf = 0;
          let pendingTransformX = 0;
          let pendingOpacity = 1;

          const hasHorizontalScrollableAncestor = (target, stopAt) => {
            let el = target instanceof Element ? target : null;
            while (el && el !== stopAt && el !== document.body) {
              const cs = getComputedStyle(el);
              const overflowX = String(cs.overflowX || "");
              if ((overflowX === "auto" || overflowX === "scroll") && el.scrollWidth > el.clientWidth + 1) {
                return true;
              }
              el = el.parentElement;
            }
            return false;
          };

          const getTabItems = () => Array.from(document.querySelectorAll(".tab-bar .tab-item"));
          const getContentContainer = () => document.querySelector("#root .min-h-screen .flex-1.overflow-hidden");
          const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
          const hasActiveTextSelection = () => {
            const selection = typeof window.getSelection === "function" ? window.getSelection() : null;
            if (!selection || selection.rangeCount === 0 || selection.isCollapsed) return false;
            return String(selection).trim().length > 0;
          };

          const cancelDragFrame = () => {
            if (!dragRaf) return;
            window.cancelAnimationFrame(dragRaf);
            dragRaf = 0;
          };

          const flushDragStyle = () => {
            dragRaf = 0;
            if (!sourceContainer) return;
            sourceContainer.style.transform = `translate3d(${pendingTransformX}px, 0, 0)`;
            sourceContainer.style.opacity = String(pendingOpacity);
          };

          const queueDragStyle = (x, opacity) => {
            pendingTransformX = x;
            pendingOpacity = opacity;
            if (dragRaf) return;
            dragRaf = window.requestAnimationFrame(flushDragStyle);
          };

          const clearSwipeStyle = (container) => {
            if (!container) return;
            container.classList.remove("wms-swipe-shell", "wms-swiping");
            container.style.transform = "";
            container.style.opacity = "";
          };

          const animateBack = (container) => {
            if (!container) return;
            container.classList.add("wms-swipe-shell", "wms-swiping");
            container.style.transform = "translate3d(0px, 0, 0)";
            container.style.opacity = "1";
            window.setTimeout(() => {
              clearSwipeStyle(container);
            }, 240);
          };

          const transitionToTab = (nextIndex, direction, startDx) => {
            const tabs = getTabItems();
            const next = tabs[nextIndex];
            const container = getContentContainer();
            if (!next || !container || swipeLocked) return;

            swipeLocked = true;
            container.classList.add("wms-swipe-shell", "wms-swiping");
            const width = container.clientWidth || window.innerWidth || 360;
            const sign = direction === "left" ? -1 : 1;
            const releaseX = sign * Math.max(width * 0.38, Math.abs(Number(startDx) || 0), 84);
            const enterFromX = -sign * Math.max(width * 0.22, 72);
            container.style.transform = `translate3d(${releaseX}px, 0, 0)`;
            container.style.opacity = "0";

            window.setTimeout(() => {
              next.click();
              window.requestAnimationFrame(() => {
                const newContainer = getContentContainer();
                if (!newContainer) {
                  swipeLocked = false;
                  return;
                }
                newContainer.classList.add("wms-swipe-shell", "wms-swiping");
                newContainer.style.transform = `translate3d(${enterFromX}px, 0, 0)`;
                newContainer.style.opacity = "0";
                window.requestAnimationFrame(() => {
                  newContainer.style.transform = "translate3d(0px, 0, 0)";
                  newContainer.style.opacity = "1";
                  window.setTimeout(() => {
                    clearSwipeStyle(newContainer);
                    swipeLocked = false;
                  }, 250);
                });
              });
            }, 120);
          };

          document.addEventListener("touchstart", (event) => {
            if (event.touches.length !== 1 || swipeLocked) return;
            const target = event.target;
            if (!(target instanceof Element)) return;
            if (hasActiveTextSelection()) return;
            if (target.closest("input, textarea, select, button, a, [role='button'], [contenteditable='true'], [data-no-swipe='1']")) {
              return;
            }
            const container = getContentContainer();
            if (!container || !container.contains(target)) return;
            if (hasHorizontalScrollableAncestor(target, container)) return;

            const touch = event.changedTouches?.[0];
            if (!touch) return;
            tracking = true;
            axis = "";
            sourceContainer = container;
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            touchStartTs = Date.now();
            dragDx = 0;
            cancelDragFrame();
          }, { passive: true, capture: true });

          document.addEventListener("touchmove", (event) => {
            if (!tracking || !sourceContainer) return;
            if (hasActiveTextSelection()) return resetSwipe();
            const touch = event.changedTouches?.[0];
            if (!touch) return;
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            const adx = Math.abs(dx);
            const ady = Math.abs(dy);
            if (!axis) {
              if (adx < 8 && ady < 8) return;
              axis = adx > ady * 1.2 ? "x" : "y";
            }
            if (axis === "x" && adx > ady) {
              event.preventDefault();
              const tabs = getTabItems();
              const activeIndex = tabs.findIndex((tab) => tab.classList.contains("active"));
              if (activeIndex < 0) return;
              const width = sourceContainer.clientWidth || window.innerWidth || 360;
              const maxIndex = tabs.length - 1;
              const wantsPrev = dx > 0;
              const wantsNext = dx < 0;
              const atLeftEdge = wantsPrev && activeIndex <= 0;
              const atRightEdge = wantsNext && activeIndex >= maxIndex;
              const resistance = atLeftEdge || atRightEdge ? 0.34 : 1;
              const maxOffset = width * 0.62;
              dragDx = clamp(dx * resistance, -maxOffset, maxOffset);
              const fade = 1 - Math.min(0.34, (Math.abs(dragDx) / Math.max(220, width)) * 0.46);
              sourceContainer.classList.add("wms-swipe-shell");
              sourceContainer.classList.remove("wms-swiping");
              queueDragStyle(dragDx, fade);
            }
          }, { passive: false, capture: true });

          const resetSwipe = () => {
            tracking = false;
            axis = "";
            sourceContainer = null;
            dragDx = 0;
            cancelDragFrame();
          };

          document.addEventListener("touchcancel", () => {
            if (sourceContainer) animateBack(sourceContainer);
            resetSwipe();
          }, { passive: true, capture: true });

          document.addEventListener("touchend", (event) => {
            if (!tracking || !sourceContainer) return resetSwipe();
            if (hasActiveTextSelection()) return resetSwipe();
            const touch = event.changedTouches?.[0];
            if (!touch) return resetSwipe();

            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            const dt = Math.max(1, Date.now() - touchStartTs);
            const adx = Math.abs(dx);
            const ady = Math.abs(dy);
            const velocity = adx / dt;
            const tabs = getTabItems();
            const activeIndex = tabs.findIndex((tab) => tab.classList.contains("active"));
            const width = sourceContainer.clientWidth || window.innerWidth || 360;
            const threshold = Math.max(64, Math.round(width * 0.16));
            const releaseDx = dragDx || dx;
            const releaseAbs = Math.abs(releaseDx);
            const validSwipe = axis === "x" && adx > ady * 1.05 && (releaseAbs >= threshold || (releaseAbs >= 26 && velocity >= 0.45));
            const container = sourceContainer;

            if (axis === "x") event.preventDefault();
            if (!validSwipe || activeIndex < 0) {
              animateBack(container);
              return resetSwipe();
            }

            if (releaseDx < 0 && activeIndex < tabs.length - 1) {
              transitionToTab(activeIndex + 1, "left", releaseDx);
            } else if (releaseDx > 0 && activeIndex > 0) {
              transitionToTab(activeIndex - 1, "right", releaseDx);
            } else {
              animateBack(container);
            }
            resetSwipe();
          }, { passive: false, capture: true });
        }

        function showOtaNotice(notice) {

          const completedAt = String(notice?.completedAt || "");
          const notes = String(notice?.notes || "").trim();
          const detail = String(notice?.detail || "").trim();

          if (authInline.parentElement !== topCard) {

        async function setupCloudAuthBadge() {
          try {
            const res = await fetch("/api/session", { credentials: "same-origin", cache: "no-store" });

              cloudSessionEnabled = false;
              smartClimateFeatureEnabled = false;
              plugKnownCount = 0;

              upsertSchedulesPlugCard();
              upsertSmartClimateCard();
              upsertSettingsSmartPlugCard();

            const data = await res.json();

              cloudSessionEnabled = false;
              smartClimateFeatureEnabled = false;
              plugKnownCount = 0;
              authInline.style.display = "none";
              closeLanguageMenu();
              upsertAddDeviceHeaderAction();
              upsertSchedulesPlugCard();
              upsertSmartClimateCard();
              upsertSettingsSmartPlugCard();
              upsertSettingsHaCard();
              return;
            }
            cloudSessionEnabled = true;

            touchCloudSession(true);
            mountAuthInline();

            authInline.style.display = "flex";
            upsertAddDeviceHeaderAction();
            upsertSchedulesPlugCard();
            upsertSmartClimateCard();

            upsertSettingsHaCard();

            smartClimateFeatureEnabled = false;
            plugKnownCount = 0;
            authInline.style.display = "none";
            closeLanguageMenu();
            upsertAddDeviceHeaderAction();
            upsertSchedulesPlugCard();
            upsertSmartClimateCard();
            upsertSettingsSmartPlugCard();
            upsertSettingsHaCard();

        function normalizePairStateKey(value) {
          const raw = String(value || "").trim().toLowerCase();
          if (!raw) return "unknown";
          if (raw === "pairing" || raw === "discoverable" || raw === "provisioning") return "pairing";
          if (raw === "assigned" || raw === "claimed") return "assigned";
          if (raw === "unassigned" || raw === "factory" || raw === "idle") return "unassigned";
          return "unknown";
        }

        function pairStateLabel(value) {
          const key = normalizePairStateKey(value);
          if (key === "pairing") return t("addDeviceStatePairing");
          if (key === "assigned") return t("addDeviceStateAssigned");
          if (key === "unassigned") return t("addDeviceStateUnassigned");
          return t("addDeviceStateUnknown");
        }

        function uiHardwareLabel(value) {
          const hw = String(value || "").trim().toLowerCase();
          if (hw === "esp32") return "ESP32";
          if (hw === "esp32c6") return "ESP32-C6";
          if (hw === "sonoff4ch") return "SONOFF 4CH";
          if (hw === "bwshp6") return "BW-SHP6";
          return String(value || "-");

        function closeAddDeviceModal() {
          const modal = document.getElementById("wms-add-device-modal");
          if (!modal) return;
          modal.classList.remove("show");
          addDeviceRequestId += 1;
          addDeviceLoading = false;
          addDeviceBusyId = "";
          refreshAddDeviceFooterButtons();
        }

        function bindAddDeviceModalHandlers(modal) {
          if (!(modal instanceof HTMLElement)) return;
          if (modal.dataset.handlersBound === "1") return;
          modal.dataset.handlersBound = "1";

          const handleAction = (event, fromPointer = false) => {
            const target = event.target;
            if (!(target instanceof Element)) return false;

            if (target === modal) {
              if (fromPointer) addDeviceLastPointerActionTs = Date.now();
              closeAddDeviceModal();
              return true;
            }

            const closeControl = target.closest("#wms-add-device-close, #wms-add-device-close-x");
            if (closeControl) {
              if (fromPointer) addDeviceLastPointerActionTs = Date.now();
              pulseAddDeviceButton(closeControl);
              closeAddDeviceModal();
              return true;
            }

            const refreshControl = target.closest("#wms-add-device-refresh");
            if (refreshControl) {
              if (addDeviceLoading) return true;
              if (fromPointer) addDeviceLastPointerActionTs = Date.now();
              pulseAddDeviceButton(refreshControl);
              loadCompatibleDevices({ showLoading: true, showRefreshResult: true });
              return true;
            }

            const claimControl = target.closest("[data-wms-claim-device]");
            if (claimControl) {
              if (!(claimControl instanceof HTMLButtonElement) || claimControl.disabled) return true;
              const did = String(claimControl.getAttribute("data-wms-claim-device") || "").trim();
              const code = String(claimControl.getAttribute("data-wms-claim-code") || "").trim();
              if (fromPointer) addDeviceLastPointerActionTs = Date.now();
              pulseAddDeviceButton(claimControl);
              if (did) claimCompatibleDevice(did, code);
              return true;
            }

            const unclaimControl = target.closest("[data-wms-unclaim-device]");
            if (unclaimControl) {
              if (!(unclaimControl instanceof HTMLButtonElement) || unclaimControl.disabled) return true;
              const did = String(unclaimControl.getAttribute("data-wms-unclaim-device") || "").trim();
              if (fromPointer) addDeviceLastPointerActionTs = Date.now();
              pulseAddDeviceButton(unclaimControl);
              if (did) unclaimCompatibleDevice(did);
              return true;
            }
            return false;
          };

          modal.addEventListener("pointerup", (event) => {
            const used = handleAction(event, true);
            if (used) {
              event.preventDefault();
              event.stopPropagation();
            }
          }, { capture: true });

          modal.addEventListener("click", (event) => {
            if (Date.now() - addDeviceLastPointerActionTs < 350) return;
            const used = handleAction(event, false);
            if (used) {
              event.preventDefault();
              event.stopPropagation();
            }
          }, { capture: true });

          if (!addDeviceEscBound) {
            document.addEventListener("keydown", (event) => {
              if (event.key !== "Escape") return;
              const current = document.getElementById("wms-add-device-modal");
              if (!current || !current.classList.contains("show")) return;
              closeAddDeviceModal();
            });
            addDeviceEscBound = true;
          }
        }

        function ensureAddDeviceModal() {
          let modal = document.getElementById("wms-add-device-modal");
          if (modal) {
            bindAddDeviceModalHandlers(modal);
            return modal;
          }
          modal = document.createElement("div");
          modal.id = "wms-add-device-modal";
          modal.innerHTML = `
            <div class="wms-add-device-card" role="dialog" aria-modal="true" aria-labelledby="wms-add-device-title">
              <div class="wms-add-device-head">
                <h3 id="wms-add-device-title"></h3>
                <button id="wms-add-device-close-x" type="button" data-no-swipe="1" aria-label="${t("addDeviceClose")}">×</button>
              </div>
              <p id="wms-add-device-hint"></p>
              <div id="wms-add-device-msg"></div>
              <div id="wms-add-device-list"></div>
              <div class="wms-add-device-foot">
                <button id="wms-add-device-close" class="wms-add-device-btn" type="button" data-no-swipe="1"></button>
                <button id="wms-add-device-refresh" class="wms-add-device-btn" type="button" data-no-swipe="1"></button>
              </div>
            </div>
          `;
          document.body.appendChild(modal);
          bindAddDeviceModalHandlers(modal);

          refreshAddDeviceModalTexts();
          return modal;
        }

        async function loadCompatibleDevices({ showLoading = true, showRefreshResult = false } = {}) {
          const modal = document.getElementById("wms-add-device-modal");
          if (!modal || !modal.classList.contains("show")) return;
          const requestId = ++addDeviceRequestId;
          addDeviceLoading = true;
          refreshAddDeviceFooterButtons();
          if (showLoading) {
            addDeviceMessage = "";
            addDeviceMessageOk = false;
            setAddDeviceMessage("");
          }
          renderAddDeviceRows();

          try {
            const r = await fetch("/api/devices/compatible", { credentials: "same-origin", cache: "no-store" });
            const d = await r.json().catch(() => ({}));
            if (requestId !== addDeviceRequestId) return;
            if (!r.ok || !d?.ok || !Array.isArray(d?.devices)) {
              addDeviceDevices = [];
              addDeviceLoading = false;
              refreshAddDeviceFooterButtons();
              renderAddDeviceRows();
              setAddDeviceMessage(d?.error || t("addDeviceLoadError"));
              return;
            }
            addDeviceDevices = d.devices;
            addDeviceLoading = false;
            refreshAddDeviceFooterButtons();
            renderAddDeviceRows();
            if (d?.can_discover === false) {
              setAddDeviceMessage(t("addDeviceDiscoveryUnavailable"));
            } else if (showRefreshResult) {
              setAddDeviceMessage(t("addDeviceRefreshed", { count: Array.isArray(d.devices) ? d.devices.length : 0 }), true);
            } else if (!addDeviceMessageOk) {
              setAddDeviceMessage("");
            }
          } catch {
            if (requestId !== addDeviceRequestId) return;
            addDeviceDevices = [];
            addDeviceLoading = false;
            refreshAddDeviceFooterButtons();
            renderAddDeviceRows();
            setAddDeviceMessage(t("addDeviceLoadError"));
          }
        }

        async function claimCompatibleDevice(deviceId, claimCode = "") {
          const did = String(deviceId || "").trim();
          if (!did || addDeviceBusyId) return;
          const code = String(claimCode || "").trim();
          addDeviceBusyId = did;
          setAddDeviceMessage(t("addDeviceClaimingProgress", { deviceId: did }), true);
          renderAddDeviceRows();
          let timer = 0;
          try {
            const controller = new AbortController();
            timer = window.setTimeout(() => controller.abort(), 15000);
            const r = await fetch("/api/devices/claim", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(code ? { device_id: did, claim_code: code } : { device_id: did }),
              credentials: "same-origin",
              cache: "no-store",
              signal: controller.signal,
            });
            window.clearTimeout(timer);
            timer = 0;
            const bodyText = await r.text().catch(() => "");
            let d = {};
            try {
              d = bodyText ? JSON.parse(bodyText) : {};
            } catch {
              d = {};
            }
            if (!r.ok || !d?.ok) {
              const backendError = String(d?.error || "").trim();
              const fallbackError = bodyText ? String(bodyText).trim().slice(0, 180) : "";
              const errorText = backendError || fallbackError || t("addDeviceClaimError");
              setAddDeviceMessage(`${errorText} [HTTP ${r.status}]`);
              return;
            }
            await loadCompatibleDevices({ showLoading: false, showRefreshResult: true });
            setAddDeviceMessage(t("addDeviceClaimSuccess", { deviceId: did }), true);
            refreshPlugPresence(true);
          } catch (err) {
            if (String(err?.name || "") === "AbortError") {
              setAddDeviceMessage(t("addDeviceClaimTimeout"));
            } else {
              setAddDeviceMessage(t("addDeviceClaimError"));
            }
          } finally {
            if (timer) window.clearTimeout(timer);
            addDeviceBusyId = "";
            renderAddDeviceRows();
          }
        }

        async function unclaimCompatibleDevice(deviceId) {
          const did = String(deviceId || "").trim();
          if (!did || addDeviceBusyId) return;
          addDeviceBusyId = did;
          setAddDeviceMessage("");
          renderAddDeviceRows();
          try {
            const r = await fetch("/api/devices/unclaim", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ device_id: did }),
              credentials: "same-origin",
            });
            const d = await r.json().catch(() => ({}));
            if (!r.ok || !d?.ok) {
              setAddDeviceMessage(d?.error || t("addDeviceUnclaimError"));
              return;
            }
            await loadCompatibleDevices({ showLoading: false });
            setAddDeviceMessage(t("addDeviceUnclaimSuccess", { deviceId: did }), true);
            refreshPlugPresence(true);
          } catch {
            setAddDeviceMessage(t("addDeviceUnclaimError"));
          } finally {
            addDeviceBusyId = "";
            renderAddDeviceRows();
          }
        }

        function openAddDeviceModal() {
          if (!cloudSessionEnabled) return;
          const modal = ensureAddDeviceModal();
          modal.classList.add("show");
          refreshAddDeviceModalTexts();
          loadCompatibleDevices({ showLoading: true });
        }

        function setPlugMessage(text, ok = false) {
          plugMessage = String(text || "");
          plugMessageOk = !!ok;
          const node = document.getElementById("wms-plug-msg");
          if (!node) return;
          node.textContent = plugMessage ? translateTextValue(plugMessage) : "";
          node.style.color = plugMessage ? (plugMessageOk ? "#059669" : "#b91c1c") : "#6b7280";
        }

        function formatPlugNumber(value, digits = 2) {
          const n = Number(value);
          if (!Number.isFinite(n)) return "0";
          return n.toLocaleString(undefined, {
            minimumFractionDigits: 0,
            maximumFractionDigits: digits,
          });
        }

        function formatPlugRemaining(secondsRaw) {
          const sec = Math.max(0, Math.floor(Number(secondsRaw) || 0));
          if (!sec) return "0s";
          const h = Math.floor(sec / 3600);
          const m = Math.floor((sec % 3600) / 60);
          const s = sec % 60;
          if (h > 0) return `${h}h ${m}m`;
          if (m > 0) return `${m}m ${s}s`;
          return `${s}s`;
        }

          const modal = document.getElementById("wms-plug-modal");
          if (!modal) return;
          modal.classList.remove("show");
          plugRequestId += 1;

            empty.className = "wms-add-device-empty";

            list.appendChild(empty);
            return;
          }

          plugDevices.forEach((plug) => {
            const row = document.createElement("div");
            row.className = "wms-add-device-row";

            const left = document.createElement("div");
            left.className = "wms-add-device-main";

            const id = document.createElement("div");
            id.className = "wms-add-device-id";
            id.textContent = String(plug?.device_id || "-");
            left.appendChild(id);

            const statusLabel = plug?.online ? t("plugOnline") : t("plugOffline");
            const relayLabel = plug?.relay_on ? t("plugOn") : t("plugOff");
            const meta1 = document.createElement("div");
            meta1.className = "wms-add-device-meta";
            meta1.textContent = `${statusLabel} • ${t("addDeviceIp")}: ${String(plug?.ip || "-")} • FW: ${String(plug?.fw_version || "-")}`;
            left.appendChild(meta1);

            const meta2 = document.createElement("div");
            meta2.className = "wms-add-device-meta";
            meta2.textContent = `${relayLabel} • ${t("plugPower")}: ${formatPlugNumber(plug?.power_w, 1)} W • ${t("plugEnergy")}: ${formatPlugNumber(plug?.energy_total_kwh, 3)} kWh`;
            left.appendChild(meta2);

            const meta3 = document.createElement("div");
            meta3.className = "wms-add-device-meta";
            meta3.textContent = `${t("plugVoltage")}: ${formatPlugNumber(plug?.voltage_v, 1)} V • ${t("plugCurrent")}: ${formatPlugNumber(plug?.current_a, 3)} A • ${t("plugRemaining")}: ${formatPlugRemaining(plug?.remaining_sec)}`;
            left.appendChild(meta3);

            row.appendChild(left);

            if (plug?.online) {
              const busy = plugBusyId && plugBusyId === String(plug?.device_id || "");
              const nextOn = !(plug?.relay_on === true);
              const btn = document.createElement("button");
              btn.type = "button";
              btn.className = nextOn ? "wms-add-device-action" : "wms-add-device-action-danger";
              btn.disabled = !!plugBusyId;
              btn.classList.toggle("is-busy", !!busy);
              btn.textContent = busy ? `${nextOn ? t("plugTurnOn") : t("plugTurnOff")}...` : (nextOn ? t("plugTurnOn") : t("plugTurnOff"));
              btn.addEventListener("click", (event) => {

        function bindPlugModalHandlers(modal) {
          if (!(modal instanceof HTMLElement)) return;
          if (modal.dataset.handlersBound === "1") return;
          modal.dataset.handlersBound = "1";

          const handleAction = (event, fromPointer = false) => {
            const target = event.target;
            if (!(target instanceof Element)) return false;

            if (target === modal) {
              if (fromPointer) plugLastPointerActionTs = Date.now();
              closePlugModal();
              return true;
            }

            const closeControl = target.closest("#wms-plug-close, #wms-plug-close-x");
            if (closeControl) {
              if (fromPointer) plugLastPointerActionTs = Date.now();
              pulseAddDeviceButton(closeControl);
              closePlugModal();
              return true;
            }

            const refreshControl = target.closest("#wms-plug-refresh");
            if (refreshControl) {
              if (plugLoading) return true;
              if (fromPointer) plugLastPointerActionTs = Date.now();
              pulseAddDeviceButton(refreshControl);
              loadPlugDevices({ showLoading: true, showRefreshResult: true });
              return true;
            }

            return false;
          };

          modal.addEventListener("pointerup", (event) => {
            const used = handleAction(event, true);
            if (used) {
              event.preventDefault();
              event.stopPropagation();
            }
          }, { capture: true });

          modal.addEventListener("click", (event) => {
            if (Date.now() - plugLastPointerActionTs < 350) return;
            const used = handleAction(event, false);
            if (used) {
              event.preventDefault();
              event.stopPropagation();
            }
          }, { capture: true });

          if (!plugEscBound) {
            document.addEventListener("keydown", (event) => {
              if (event.key !== "Escape") return;
              const current = document.getElementById("wms-plug-modal");
              if (!current || !current.classList.contains("show")) return;
              closePlugModal();
            });
            plugEscBound = true;
          }
        }

        function ensurePlugModal() {
          let modal = document.getElementById("wms-plug-modal");
          if (modal) {
            bindPlugModalHandlers(modal);
            return modal;
          }
          modal = document.createElement("div");
          modal.id = "wms-plug-modal";
          modal.innerHTML = `
            <div class="wms-add-device-card" role="dialog" aria-modal="true" aria-labelledby="wms-plug-title">
              <div class="wms-add-device-head">
                <h3 id="wms-plug-title"></h3>
                <button id="wms-plug-close-x" type="button" data-no-swipe="1" aria-label="${t("plugClose")}">×</button>
              </div>

              <div id="wms-plug-msg"></div>
              <div id="wms-plug-list"></div>
              <div class="wms-add-device-foot">
                <button id="wms-plug-close" class="wms-add-device-btn" type="button" data-no-swipe="1"></button>
                <button id="wms-plug-refresh" class="wms-add-device-btn" type="button" data-no-swipe="1"></button>
              </div>

          `;
          document.body.appendChild(modal);

        async function loadPlugDevices({ showLoading = true, showRefreshResult = false } = {}) {
          const modal = document.getElementById("wms-plug-modal");
          if (!modal || !modal.classList.contains("show")) return;
          const requestId = ++plugRequestId;
          plugLoading = true;
          if (showLoading) {
            plugMessage = "";
            plugMessageOk = false;
            setPlugMessage("");
          }
          renderPlugRows();

          try {
            const r = await fetch("/api/plugs", { credentials: "same-origin", cache: "no-store" });
            const d = await r.json().catch(() => ({}));
            if (requestId !== plugRequestId) return;
            if (!r.ok || !d?.ok || !Array.isArray(d?.plugs)) {
              plugDevices = [];
              plugLoading = false;
              renderPlugRows();
              setPlugMessage(d?.error || t("plugRefreshError"));
              return;
            }
            plugDevices = d.plugs;
            plugKnownCount = Number(d?.count || plugDevices.length || 0);
            plugPresenceLastFetchMs = Date.now();
            plugLoading = false;
            renderPlugRows();
            upsertAddDeviceHeaderAction();
            if (showRefreshResult) {
              setPlugMessage(t("plugRefreshSuccess", { count: plugDevices.length }), true);
            } else if (!plugMessageOk) {
              setPlugMessage("");
            }
          } catch {
            if (requestId !== plugRequestId) return;
            plugDevices = [];
            plugLoading = false;
            renderPlugRows();
            setPlugMessage(t("plugRefreshError"));
          }
        }

        async function setPlugRelay(deviceId, on) {
          const did = String(deviceId || "").trim();
          if (!did || plugBusyId) return;
          plugBusyId = did;
          setPlugMessage("");
          renderPlugRows();
          try {
            const r = await fetch("/api/plug/set", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ device_id: did, on: !!on }),
              credentials: "same-origin",
            });
            const d = await r.json().catch(() => ({}));
            if (!r.ok || !d?.ok) {
              setPlugMessage(d?.error || t("plugToggleError"));
              return;
            }
            const row = plugDevices.find((item) => String(item?.device_id || "") === did);
            if (row) {
              row.relay_on = !!on;
              if (!on) row.remaining_sec = 0;
              row.sampled_at = new Date().toISOString();
            }
            renderPlugRows();
            loadPlugDevices({ showLoading: false, showRefreshResult: false }).catch(() => {});
          } catch {
            setPlugMessage(t("plugToggleError"));
          } finally {
            plugBusyId = "";
            renderPlugRows();
          }
        }

        async function refreshPlugPresence(force = false) {
          if (!cloudSessionEnabled) {
            plugKnownCount = 0;
            upsertAddDeviceHeaderAction();
            return;
          }
          const now = Date.now();
          if (!force && (plugPresenceLoading || now - plugPresenceLastFetchMs < 12000)) return;
          plugPresenceLoading = true;
          try {
            const r = await fetch("/api/plugs", { credentials: "same-origin", cache: "no-store" });
            const d = await r.json().catch(() => ({}));
            if (!r.ok || !d?.ok || !Array.isArray(d?.plugs)) return;
            plugKnownCount = Number(d?.count || d.plugs.length || 0);
            plugPresenceLastFetchMs = Date.now();
            upsertAddDeviceHeaderAction();
          } catch {
            // keep previous state
          } finally {
            plugPresenceLoading = false;
          }
        }

        function upsertPlugTabItem() {
          const existingTile = document.getElementById("wms-plug-tab-item");
          if (!cloudSessionEnabled || plugKnownCount <= 0) {
            if (existingTile) existingTile.remove();
            closePlugModal();
            return;
          }

          const tabBar = document.querySelector(".tab-bar");
          if (!(tabBar instanceof HTMLElement)) {
            if (existingTile) existingTile.style.display = "none";
            return;
          }

          let tile = existingTile;
          if (!(tile instanceof HTMLElement)) {
            tile = document.createElement("div");
            tile.id = "wms-plug-tab-item";
            tile.className = "tab-item haptic-feedback cursor-pointer text-ios-gray";
            tile.setAttribute("role", "button");
            tile.setAttribute("tabindex", "0");
            tile.setAttribute("data-no-swipe", "1");
            tile.innerHTML = `
              <div class="text-2xl mb-1" aria-hidden="true">🔌</div>
              <div class="text-xs font-medium">${t("plugTile")}</div>
            `;

            const openPlugTab = () => {
              const modal = ensurePlugModal();
              modal.classList.add("show");
              refreshPlugModalTexts();
              loadPlugDevices({ showLoading: true });
              if (plugRefreshTimer) clearInterval(plugRefreshTimer);
              plugRefreshTimer = setInterval(() => {
                const current = document.getElementById("wms-plug-modal");
                if (!current || !current.classList.contains("show")) return;
                loadPlugDevices({ showLoading: false, showRefreshResult: false });
              }, 7000);
            };

            tile.addEventListener("click", openPlugTab);
            tile.addEventListener("keydown", (event) => {
              if (event.key !== "Enter" && event.key !== " ") return;
              event.preventDefault();
              openPlugTab();
            });
          }

          const labelNode = tile.querySelector(".text-xs");
          if (labelNode) labelNode.textContent = t("plugTile");
          tile.setAttribute("title", t("plugTile"));
          tile.setAttribute("aria-label", t("plugTile"));
          tile.style.display = "";

          const tabItems = Array.from(tabBar.querySelectorAll(".tab-item")).filter((el) => el !== tile);
          const weatherLabel = normalizePhrase(t("Pogoda"));
          const logsLabel = normalizePhrase(t("Logi"));
          const tabLabel = (el) => normalizePhrase(
            el.querySelector(".text-xs")?.textContent
            || el.querySelector(".text-xs.font-medium")?.textContent
            || el.textContent
            || ""
          );

          const weatherTab = tabItems.find((el) => tabLabel(el) === weatherLabel);
          const logsTab = tabItems.find((el) => tabLabel(el) === logsLabel);

          if (logsTab && logsTab.parentElement === tabBar) {
            if (tile.nextElementSibling !== logsTab || tile.parentElement !== tabBar) {
              tabBar.insertBefore(tile, logsTab);
            }
          } else if (weatherTab && weatherTab.parentElement === tabBar) {
            if (weatherTab.nextElementSibling === tile) {
              // already in correct slot
            } else if (weatherTab.nextElementSibling) {
              tabBar.insertBefore(tile, weatherTab.nextElementSibling);
            } else {
              tabBar.appendChild(tile);
            }
          } else if (tile.parentElement !== tabBar) {
            tabBar.appendChild(tile);
          }
        }

        function findCurrentSectionHeaderHeading() {
          const root = document.getElementById("root");
          if (!root) return null;
          const headings = Array.from(root.querySelectorAll("h2"));
          return headings.find((heading) => {
            if (!(heading instanceof HTMLElement)) return false;
            if (heading.offsetParent === null) return false;
            const block = heading.parentElement;
            if (!(block instanceof HTMLElement)) return false;
            if (!block.querySelector("p")) return false;

        function getTopInfoBars() {
          const root = document.getElementById("root");
          if (!root) return { systemBar: null, weatherBar: null };
          const cards = Array.from(root.querySelectorAll(".ios-card"))
            .filter((card) => card instanceof HTMLElement && card.offsetParent !== null);
          if (!cards.length) return { systemBar: null, weatherBar: null };

          let systemBar = (authInline && authInline.parentElement instanceof HTMLElement)
            ? authInline.parentElement
            : null;
          if (!(systemBar instanceof HTMLElement) || !cards.includes(systemBar)) systemBar = cards[0];

          let weatherBar = null;
          let sibling = systemBar.nextElementSibling;
          while (sibling) {
            if (sibling instanceof HTMLElement && sibling.classList.contains("ios-card") && sibling.offsetParent !== null) {
              weatherBar = sibling;
              break;
            }
            sibling = sibling.nextElementSibling;
          }
          if (!(weatherBar instanceof HTMLElement)) {
            const systemIndex = cards.indexOf(systemBar);
            weatherBar = systemIndex >= 0 ? (cards[systemIndex + 1] || null) : null;
          }
          return { systemBar, weatherBar };
        }

        async function saveZoneCount(value, msgEl, btnEl) {
          if (btnEl?.dataset.locked === "1") {
            delete msgEl.dataset.runtimeMessage;
            msgEl.dataset.noteKey = "zoneCountFixedSonoff";
            msgEl.textContent = t("zoneCountFixedSonoff");
            msgEl.style.color = "#6b7280";
            return;
          }
          const parsed = Number(value);
          const nextZoneCount = Number.isFinite(parsed) ? Math.round(parsed) : NaN;
          if (!Number.isFinite(nextZoneCount) || nextZoneCount < 1 || nextZoneCount > 8) {
            msgEl.textContent = t("zoneSaveFailed");
            msgEl.dataset.runtimeMessage = "1";
            msgEl.style.color = "#dc2626";
            return;
          }
          const oldLabel = btnEl.textContent;
          btnEl.disabled = true;
          btnEl.textContent = t("saving");
          try {
            const r = await fetch("/api/settings", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ zoneCount: nextZoneCount }),
              credentials: "same-origin"
            });
            if (!r.ok) throw new Error(t("saveFailedError"));
            msgEl.textContent = t("zoneSavedRefresh");
            msgEl.dataset.runtimeMessage = "1";
            msgEl.style.color = "#059669";
            zoneSettingsLoaded = false;
            await upsertZoneCountCard();
            try { await upsertSmartClimateCard(); } catch {}
            window.dispatchEvent(new CustomEvent("wms-zone-count-updated", { detail: { zoneCount: nextZoneCount } }));
          } catch {
            msgEl.textContent = t("zoneSaveFailed");
            msgEl.dataset.runtimeMessage = "1";
            msgEl.style.color = "#dc2626";
          } finally {
            btnEl.disabled = false;
            btnEl.textContent = oldLabel || t("save");
          }
        }

        function smartClimateZoneTypeLabel(zoneType) {
          const type = String(zoneType || "").trim().toLowerCase();
          if (type === "flowerbed") return t("smartClimateZoneTypeFlowerbed");
          if (type === "drip") return t("smartClimateZoneTypeDrip");
          if (type === "shrubs") return t("smartClimateZoneTypeShrubs");
          if (type === "custom") return t("smartClimateZoneTypeCustom");
          return t("smartClimateZoneTypeLawn");
        }

        function smartClimateZoneState(zone) {
          if (!zone || zone.managed !== true) return "inactive";
          if (zone.active === true) return "running";
          const reason = String(zone.lastReason || "").trim().toLowerCase();
          if (reason.includes("uruchomiono")) return "running";
          if (
            reason.includes("mroz")
            || reason.includes("przymro")
            || reason.includes("temperatur")
            || reason.includes("wiatr")
            || reason.includes("opad")
            || reason.includes("deszcz")
            || reason.includes("prognoza")
            || reason.includes("ryzyko")
            || reason.includes("za kr")
            || reason.includes("przerwa")
            || reason.includes("pozosta")
            || reason.includes("offline")
            || reason.includes("błąd")
            || reason.includes("blad")
            || reason.includes("error")
          ) {
            return "blocked";
          }
          if (zone.nextRunAt) return "scheduled";
          return "waiting";
        }

        function smartClimateZoneStatusLabel(state) {
          if (state === "running") return t("smartClimateStateRunning");
          if (state === "blocked") return t("smartClimateStateBlocked");
          if (state === "scheduled") return t("smartClimateStateScheduled");
          if (state === "waiting") return t("smartClimateStateWaiting");
          return t("smartClimateStateInactive");
        }

          const cfg = smartClimateCardData?.config || {};
          const zones = Array.isArray(smartClimateCardData?.zones) ? smartClimateCardData.zones : [];

        function renderSchedulePlugRows() {

            const power = Number(plug?.power_w || 0);
            meta.textContent = `${statusLabel} • ${t("plugPower")}: ${power.toFixed(1)} W`;
            left.appendChild(meta);

            btn.className = `wms-schedules-plug-btn ${nextOn ? "off" : "on"}`;

            const did = String(plug?.device_id || "");
            const busy = !!schedulePlugBusyId && schedulePlugBusyId === did;
            btn.disabled = busy || !plug?.online || !did;
            btn.setAttribute("data-schedule-plug-device", did);
            btn.setAttribute("data-schedule-plug-next-on", nextOn ? "1" : "0");
            row.appendChild(btn);

            list.appendChild(row);

        async function loadSchedulePlugItems({ showRefreshResult = false } = {}) {
          const card = document.getElementById("wms-schedules-plug-card");
          if (!(card instanceof HTMLElement) || card.offsetParent === null) return;
          schedulePlugLoading = true;
          renderSchedulePlugRows();
          if (!showRefreshResult) setSchedulePlugMsg("");
          try {
            const r = await fetch("/api/plugs", { credentials: "same-origin", cache: "no-store" });
            const d = await r.json().catch(() => ({}));
            if (!r.ok || !d?.ok || !Array.isArray(d?.plugs)) {
              schedulePlugItems = [];
              schedulePlugLoading = false;
              renderSchedulePlugRows();
              setSchedulePlugMsg(t("schedulePlugRefreshError"));
              return;
            }
            schedulePlugItems = d.plugs;
            schedulePlugLoading = false;
            schedulePlugLoaded = true;
            plugKnownCount = Number(d?.count || d.plugs.length || 0);
            upsertAddDeviceHeaderAction();
            renderSchedulePlugRows();
            if (showRefreshResult) setSchedulePlugMsg(t("schedulePlugRefreshSuccess"), true);
          } catch {
            schedulePlugItems = [];
            schedulePlugLoading = false;
            renderSchedulePlugRows();
            setSchedulePlugMsg(t("schedulePlugRefreshError"));
          }
        }

        async function setSchedulePlugRelay(deviceId, on) {
          const did = String(deviceId || "").trim();
          if (!did || schedulePlugBusyId) return;
          schedulePlugBusyId = did;
          renderSchedulePlugRows();
          try {
            const r = await fetch("/api/plug/set", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "same-origin",
              body: JSON.stringify({ device_id: did, on: !!on }),
            });
            const d = await r.json().catch(() => ({}));
            if (!r.ok || !d?.ok) {
              setSchedulePlugMsg(d?.error || t("schedulePlugToggleError"));
              return;
            }
            const row = schedulePlugItems.find((item) => String(item?.device_id || "") === did);
            if (row) {
              row.relay_on = !!on;
              if (!on) row.remaining_sec = 0;
              row.sampled_at = new Date().toISOString();
            }
            renderSchedulePlugRows();
            loadSchedulePlugItems({ showRefreshResult: false }).catch(() => {});
          } catch {
            setSchedulePlugMsg(t("schedulePlugToggleError"));
          } finally {
            schedulePlugBusyId = "";
            renderSchedulePlugRows();
          }
        }
